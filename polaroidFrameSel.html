<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="stylesheets/styles.css">
        <title>Polaroid Frame Selection</title>
    </head>

    <body>
        <div id="app">
            <div id="selectedTemplateContainer"></div>

            <img src="assets/backgrounds/photoFormatbg.png" id="photoFormatBG">

            <button id="default">
                <img src="assets/polaroidFrames/polaroidDefaultTemp.png" id="defaultTemp">
            </button>

            <button id="nagano">
                <img src="assets/polaroidFrames/naganoFrame.png" id="naganoTemp">
            </button>

            <button id="jungle">
                <img src="assets/polaroidFrames/jungleFrame.png" id="jungleTemp">
            </button>

            <button id="gigi">
                <img src="assets/polaroidFrames/gigiFrame.png" id="gigiTemp">
            </button>

            <button id="idle">
                <img src="assets/polaroidFrames/miniIdleFrame.png" id="idleTemp">
            </button>

            <button id="blackpink">
                <img src="assets/polaroidFrames/blackpinkFrame.png" id="blackpinkTemp">
            </button>

            <button id="backButton">
                <a href="photoFormat.html">
                    <img src="assets/buttons/backbutton.png" id="backButtonImage">
                </a>
            </button>
        </div>
        <script src="javascripts/polaroidFrameSel.js"></script>
        <script src="frameData.js"></script>
    </body>
</html>
